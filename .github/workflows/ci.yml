name: Expedition-0 Backend CI

on:
  push:
    branches: [ "master", "develop", "feature/**" ]
  pull_request:
    branches: [ "master", "develop" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      - name: Run Flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all other errors as warnings (adjust as you get stricter)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Install in editable mode with development dependencies
          pip install -e .[dev]

      - name: Run Pytest (no AI services)
        env:
          # Used to toggle off heavy AI loading in test environments
          TESTING: "True"
        run: |
          # Only run deterministic unit and integration tests
          pytest test/ -v --maxfail=2 --ignore=test/ai
