services:
  main-app:
    build:
      context: .
      dockerfile: docker_app.Dockerfile
    env_file: .env
    volumes:
      - ./data:/workspace/data
    restart: always
    ports:
      - "5000:5000"
    stdin_open: true
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

  stt-service:
    build:
      context: .
      dockerfile: docker_stt.Dockerfile
    env_file: .env
    volumes:
      - ./data:/workspace/data
    restart: always
    ports:
      - "5001:5001"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]